<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>todae digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="todae digital — strategy, design and engineering for ambitious teams." />

  <!-- Open Graph -->
  <meta property="og:title" content="todae digital" />
  <meta property="og:description" content="Strategy, design and engineering for ambitious teams." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://todaedigital.com" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- JetBrains Mono + Inter as web-safe fallbacks when Söhne isn't installed locally -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Söhne';
      font-weight: 100 900;
      src: local('Söhne'), local('Soehne'), local('Söhne Buch'), local('Söhne Kraftig'), local('Söhne Dreiviertelfett'), local('Söhne Extrafett');
      font-display: swap;
    }
    @font-face {
      font-family: 'Söhne Mono';
      font-weight: 400 700;
      src: local('Söhne Mono'), local('Soehne Mono'), local('Söhne Mono Buch'), local('Söhne Mono Kraftig');
      font-display: swap;
    }

    :root {
      --forest: #0E3B3A;
      --cream:  #F3E9D2;
      --amber:  #F0B034;
      --pine:   #3A7A6A;
      --sans: 'Söhne', 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'Söhne Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--forest);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    /* wordmark — Söhne 900, −3% tracking per brand spec */
    .word {
      font-family: var(--sans);
      font-weight: 900;
      font-size: clamp(48px, 12vw, 180px);
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--cream);
      display: inline-flex;
      align-items: flex-end;
    }

    /* circular amber dot — sized relative to the wordmark */
    .word .dot {
      width: 0.18em;
      height: 0.18em;
      border-radius: 50%;
      background: var(--amber);
      display: inline-block;
      flex-shrink: 0;
      margin-left: 0.03em;
      margin-bottom: 0.04em;
    }

    /* sine wave */
    .wave-wrap {
      margin-top: 6px;
      display: flex;
      justify-content: center;
    }
    .wave-wrap svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* caption — Söhne Mono 500, +32% tracking per brand spec */
    .caption {
      margin-top: 18px;
      font-family: var(--mono);
      font-weight: 500;
      font-size: clamp(9px, 1.05vw, 15px);
      letter-spacing: 0.32em;
      text-indent: 0.32em; /* optical compensation for trailing letter-spacing */
      color: rgba(243, 233, 210, 0.75);
      text-transform: uppercase;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="lockup">
    <div class="word">
      <span id="wordText">todae</span>
      <span class="dot"></span>
    </div>
    <div class="wave-wrap">
      <svg id="wave" viewBox="-4 -26 1008 52" preserveAspectRatio="none"></svg>
    </div>
    <div class="caption">Digital / Strategy / Build</div>
  </div>

  <script>
    // Smooth Catmull-Rom → cubic bezier sine wave
    // Matches the design: amplitude 18, frequency 3, stroke 4, Pine #3A7A6A
    // Typography: Söhne 900 wordmark, Söhne Mono 500 caption (brand spec)
    function buildWave(W, amp, freq) {
      const samples = 160;
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        pts.push([t * W, Math.sin(t * Math.PI * 2 * freq) * amp]);
      }
      const d = [`M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)}`];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) / 6;
        const c1y = p1[1] + (p2[1] - p0[1]) / 6;
        const c2x = p2[0] - (p3[0] - p1[0]) / 6;
        const c2y = p2[1] - (p3[1] - p1[1]) / 6;
        d.push(`C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2[0].toFixed(2)} ${p2[1].toFixed(2)}`);
      }
      return d.join(' ');
    }

    const svg       = document.getElementById('wave');
    const waveWrap  = svg.parentElement;
    const wordEl    = document.querySelector('.word');
    const wordText  = document.getElementById('wordText');
    const captionEl = document.querySelector('.caption');

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('fill',            'none');
    path.setAttribute('stroke',          '#3A7A6A');
    path.setAttribute('stroke-width',    '4');
    path.setAttribute('stroke-linecap',  'round');
    path.setAttribute('stroke-linejoin', 'round');
    path.setAttribute('d', buildWave(1000, 18, 3));
    svg.appendChild(path);

    function sizeAll() {
      // Reset any previous override so we measure natural CSS sizes
      wordEl.style.fontSize = '';
      waveWrap.style.width  = '';

      // Double RAF ensures the browser has painted the reset before we measure
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const captionW = captionEl.getBoundingClientRect().width;
        const wordW    = wordEl.getBoundingClientRect().width;

        if (captionW > wordW) {
          // Mobile: caption is wider — scale the wordmark up to match it
          const base = parseFloat(getComputedStyle(wordEl).fontSize);
          wordEl.style.fontSize = (base * captionW / wordW) + 'px';
          waveWrap.style.width  = captionW + 'px';
        } else {
          // Desktop: wordmark is wider — wave matches the "todae" text span only
          waveWrap.style.width = wordText.getBoundingClientRect().width + 'px';
        }
      }));
    }

    document.fonts.ready.then(sizeAll);
    window.addEventListener('resize', sizeAll);
  </script>

</body>
</html>
