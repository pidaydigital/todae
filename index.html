  <!-- JetBrains Mono + Inter as web-safe fallbacks when Söhne isn't installed locally -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Söhne';
      font-weight: 100 900;
      src: local('Söhne'), local('Soehne'), local('Söhne Buch'), local('Söhne Kraftig'), local('Söhne Dreiviertelfett'), local('Söhne Extrafett');
      font-display: swap;
    }
    @font-face {
      font-family: 'Söhne Mono';
      font-weight: 400 700;
      src: local('Söhne Mono'), local('Soehne Mono'), local('Söhne Mono Buch'), local('Söhne Mono Kraftig');
      font-display: swap;
    }

    :root {
      --forest: #0E3B3A;
      --cream:  #F3E9D2;
      --amber:  #F0B034;
      --pine:   #3A7A6A;
      --sans: 'Söhne', 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'Söhne Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--forest);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── lockup ── */
    .lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    /* shrink-wraps to the widest child (wordmark-row or squiggle) */
    .wordmark-stack {
      display: inline-block;
      text-align: center;
    }

    /* wordmark row — Söhne 900, −3% tracking per brand spec */
    .wordmark-row {
      display: inline-flex;
      width: fit-content;
      align-items: baseline;
      line-height: 0.9;
    }

    .wordmark {
      font-family: var(--sans);
      font-weight: 900;
      font-size: clamp(48px, 12vw, 180px);
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: var(--cream);
    }

    /* period glyph — same font/weight as wordmark, amber */
    .dot {
      font-family: var(--sans);
      font-weight: 900;
      font-size: clamp(48px, 12vw, 180px);
      line-height: 0.9;
      color: var(--amber);
      margin-left: -0.02em;
    }

    /* squiggle — width set by JS to match wordmark-row */
    .squiggle {
      display: block;
      color: var(--pine);
      width: 100%;
      height: 32px;
      margin: 14px auto 0;
      overflow: visible;
    }
    .squiggle path {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    /* descriptor — Söhne Mono 500, +32% tracking per brand spec */
    .descriptor {
      margin-top: 18px;
      font-family: var(--mono);
      font-weight: 500;
      font-size: clamp(9px, 1.05vw, 15px);
      letter-spacing: 0.32em;
      text-indent: 0.32em; /* optical compensation for trailing letter-spacing */
      color: rgba(243, 233, 210, 0.75);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.85;
    }
  </style>

  <script>
    const wordmarkRow  = document.getElementById('wordmarkRow');
    const wordmarkText = document.getElementById('wordmarkText');
    const squiggle     = document.getElementById('squiggle');
    const descriptor   = document.querySelector('.descriptor');
    const wordmarkEl   = document.querySelector('.wordmark');

    // Squiggle extends ~20% beyond the wordmark row on both sides (brand spec).
    // On mobile when the descriptor is wider, wordmark scales up to match the descriptor
    // and the squiggle spans the descriptor exactly (all three elements align).
    const SQUIGGLE_SCALE = 1.20;

    function sizeAll() {
      // Reset any previous overrides
      wordmarkEl.style.fontSize = '';
      squiggle.style.width      = '';

      // Double RAF: ensures browser has painted the reset before measuring
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const rowW  = wordmarkRow.getBoundingClientRect().width;
        const descW = descriptor.getBoundingClientRect().width;

        if (descW > rowW * SQUIGGLE_SCALE) {
          // Mobile: descriptor wider than even the extended squiggle —
          // scale wordmark so the squiggle at 120% exactly matches the descriptor
          const targetRowW = descW / SQUIGGLE_SCALE;
          const base = parseFloat(getComputedStyle(wordmarkEl).fontSize);
          wordmarkEl.style.fontSize = (base * targetRowW / rowW) + 'px';
          squiggle.style.width = descW + 'px';
        } else {
          // Desktop: squiggle is 120% of the wordmark row, centered by the stack
          squiggle.style.width = (rowW * SQUIGGLE_SCALE) + 'px';
        }
      }));
    }

    document.fonts.ready.then(sizeAll);
    window.addEventListener('resize', sizeAll);
  </script>
